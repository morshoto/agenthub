name: golangci-lint

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    golangci:
        name: Lint
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.6.2
                  args: --config=.golangci.yml ./...
