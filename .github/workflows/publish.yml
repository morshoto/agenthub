name: Publish

on:
    push:
        branches:
            - main
        tags:
            - 'v*'

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write

jobs:
    tagpr:
        name: Create release PR
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Validate tagpr token
              shell: bash
              env:
                  TAGPR_TOKEN: ${{ secrets.TAGPR_TOKEN }}
              run: |
                  set -euo pipefail

                  if [[ -z "${TAGPR_TOKEN}" ]]; then
                    echo "TAGPR_TOKEN secret is required so tag creation triggers the publish job" >&2
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.TAGPR_TOKEN }}

            - name: Run tagpr
              uses: Songmu/tagpr@main
              env:
                  GITHUB_TOKEN: ${{ secrets.TAGPR_TOKEN }}

    prepare:
        name: Release version
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.resolve.outputs.version }}
            previous_tag: ${{ steps.resolve.outputs.previous_tag }}
            target_ref: ${{ steps.resolve.outputs.target_ref }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve version
              id: resolve
              shell: bash
              run: |
                  set -euo pipefail

                  version="${GITHUB_REF_NAME}"
                  target_ref="${GITHUB_SHA}"
                  if ! [[ "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "push tag must match vX.Y.Z, got ${version}" >&2
                    exit 1
                  fi
                  previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fxv "${version}" | head -n 1 || true)"

                  echo "version=${version}" >> "${GITHUB_OUTPUT}"
                  echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"
                  echo "target_ref=${target_ref}" >> "${GITHUB_OUTPUT}"

    build:
        name: Build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - goos: darwin
                      goarch: arm64
                    - goos: linux
                      goarch: amd64
        env:
            VERSION: ${{ needs.prepare.outputs.version }}
            BUILD_REF: ${{ needs.prepare.outputs.target_ref }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ env.BUILD_REF }}

            - name: Set up Go
              id: setup-go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Cache Go build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-publish-${{ matrix.goos }}-${{ matrix.goarch }}
                  restore-keys: |
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

            - name: Build binary
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  artifact="agenthub_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
                  build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  commit_sha="$(git rev-parse HEAD)"
                  GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
                    go build -trimpath \
                      -ldflags "-s -w -X agenthub/internal/app.Version=${VERSION} -X agenthub/internal/app.CommitSHA=${commit_sha} -X agenthub/internal/app.BuildDate=${build_date}" \
                      -o "dist/${artifact}" ./cmd/agenthub
                  chmod +x "dist/${artifact}"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: agenthub-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/agenthub_${{ env.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}
                  if-no-files-found: error

    release:
        name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs:
            - prepare
            - build
        env:
            VERSION: ${{ needs.prepare.outputs.version }}
            PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
            TARGET_REF: ${{ needs.prepare.outputs.target_ref }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ needs.prepare.outputs.target_ref }}

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Generate release notes and metadata
              shell: bash
              env:
                  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
              run: |
                  set -euo pipefail

                  commit_sha="$(git rev-parse HEAD)"
                  build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

                  find artifacts -type f -maxdepth 2 -name 'agenthub_*' -print0 | sort -z | xargs -0 sha256sum > checksums.txt

                  python3 .github/scripts/render_changelog.py \
                    --version "${VERSION}" \
                    --previous-tag "${PREVIOUS_TAG}" \
                    --target-ref "${TARGET_REF}" \
                    --repo-url "${REPO_URL}" \
                    --checksums checksums.txt \
                    --release-notes-out release-notes.md

                  jq -n \
                    --arg version "${VERSION}" \
                    --arg commit "${commit_sha}" \
                    --arg build_date "${build_date}" \
                    --arg tag "${VERSION}" \
                    --rawfile checksums checksums.txt \
                    '{
                      version: $version,
                      tag: $tag,
                      commit: $commit,
                      build_date: $build_date,
                      draft: true,
                      checksums: $checksums
                    }' > release-metadata.json

            - name: Create or update draft GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  assets=(
                    artifacts/*/*
                    checksums.txt
                    release-metadata.json
                  )

                  if gh release view "${VERSION}" >/dev/null 2>&1; then
                    release_json="$(gh release view "${VERSION}" --json isDraft)"
                    is_draft="$(jq -r '.isDraft' <<< "${release_json}")"
                    if [[ "${is_draft}" != "true" ]]; then
                      echo "release ${VERSION} is already published; refusing to overwrite" >&2
                      exit 1
                    fi

                    gh release edit "${VERSION}" \
                      --draft \
                      --target "${TARGET_REF}" \
                      --title "${VERSION}" \
                      --notes-file release-notes.md
                  else
                    gh release create "${VERSION}" \
                      --draft \
                      --target "${TARGET_REF}" \
                      --title "${VERSION}" \
                      --notes-file release-notes.md
                  fi

                  gh release upload "${VERSION}" "${assets[@]}" --clobber

            - name: Run smoke tests
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  mkdir -p release-assets
                  gh release download "${VERSION}" -D release-assets

                  binary="$(find release-assets -type f -name "agenthub_*_linux_amd64" -print -quit)"
                  if [[ -z "${binary}" ]]; then
                    echo "linux_amd64 release asset was not found"
                    exit 1
                  fi
                  chmod +x "${binary}"

                  smoke_config="$(mktemp)"
                  cat > "${smoke_config}" <<'EOF'
                  platform:
                    name: aws
                  region:
                    name: us-east-1
                  instance:
                    type: t3.medium
                    disk_size_gb: 20
                  image:
                    name: ubuntu-24.04
                  runtime:
                    endpoint: http://localhost:11434
                    model: llama3.2
                  sandbox:
                    enabled: false
                  EOF

                  "${binary}" version
                  "${binary}" config validate --config "${smoke_config}"

                  if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
                    "${binary}" quota check --platform aws --region us-east-1 --instance-family g5
                  else
                    echo "AWS credentials are not configured; skipping quota smoke test"
                  fi

            - name: Publish release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  gh release edit "${VERSION}" \
                    --draft=false \
                    --latest

            - name: Update release metadata
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  release_json="$(gh release view "${VERSION}" --json id,url,publishedAt)"
                  release_id="$(jq -r '.id' <<< "${release_json}")"
                  release_url="$(jq -r '.url' <<< "${release_json}")"
                  published_at="$(jq -r '.publishedAt // empty' <<< "${release_json}")"
                  if [[ -z "${published_at}" ]]; then
                    published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  fi

                  source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${VERSION}.tar.gz"
                  source_archive="$(mktemp)"
                  curl -fsSL "${source_url}" -o "${source_archive}"
                  source_sha256="$(sha256sum "${source_archive}" | awk '{print $1}')"

                  jq -n \
                    --arg version "${VERSION}" \
                    --arg release_id "${release_id}" \
                    --arg release_url "${release_url}" \
                    --arg published_at "${published_at}" \
                    --arg source_url "${source_url}" \
                    --arg source_sha256 "${source_sha256}" \
                    '{
                      version: $version,
                      release_id: $release_id,
                      release_url: $release_url,
                      published_at: $published_at,
                      source_url: $source_url,
                      source_sha256: $source_sha256,
                      status: "published"
                    }' > release-metadata.json

                  gh release upload "${VERSION}" release-metadata.json --clobber

            - name: Update Homebrew tap
              shell: bash
              env:
                  HOMEBREW_TAP_REPO: morshoto/homebrew-agenthub
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  set -euo pipefail

                  if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
                    echo "HOMEBREW_TAP_TOKEN secret is required to update the Homebrew tap" >&2
                    exit 1
                  fi

                  source_url="$(jq -r '.source_url' release-metadata.json)"
                  source_sha256="$(jq -r '.source_sha256' release-metadata.json)"

                  tap_dir="$(mktemp -d)"
                  git clone --depth=1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${tap_dir}"
                  cd "${tap_dir}"
                  git checkout -B main

                  mkdir -p Formula/a
                  python3 "${GITHUB_WORKSPACE}/.github/scripts/homebrew_formula.py" \
                    --url "${source_url}" \
                    --sha256 "${source_sha256}" \
                    --output Formula/a/agenthub.rb

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/a/agenthub.rb
                  if git diff --cached --quiet; then
                    echo "Homebrew tap formula is already up to date"
                    exit 0
                  fi
                  git commit -m "agenthub ${VERSION}"
                  git push origin HEAD:main

            - name: Publish summary
              shell: bash
              run: |
                  {
                    echo "## Release"
                    echo
                    echo "- version: ${VERSION}"
                    echo "- release published"
                    echo "- Homebrew tap updated"
                    echo "- smoke tests: version, config validate"
                    echo "- quota smoke test: conditional on AWS credentials"
                  } >> "${GITHUB_STEP_SUMMARY}"
